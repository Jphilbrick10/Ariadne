name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ariadne
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache SPICE kernels
        uses: actions/cache@v4
        with:
          path: data/kernels
          key: spice-kernels-de440s-v1

      - name: Production lint sanity
        run: ruff check src/ariadne --select E9,F63,F7,F82,B023,B904

      - name: Format check (ruff format)
        run: ruff format --check src/ariadne tests scripts benchmarks

      - name: Run fast tests
        run: pytest -m "not slow" -q

      - name: Import smoke check
        run: |
          python -c "import ariadne; print('ariadne', ariadne.__version__)"
          python -c "from ariadne.transport_graph.search import dijkstra; from ariadne.interplanetary.porkchop import lambert_transfer; from ariadne.atlas.store import write_atlas; print('imports OK')"

      - name: Top-level API smoke check
        run: |
          python -c "import ariadne; em = ariadne.system('EARTH_MOON'); fam = ariadne.lyapunov_family('L1', n=3); assert len(fam) == 3, 'lyapunov_family broken'; print('top-level API OK')"

      - name: Tutorial smoke check (01 Lyapunov family)
        run: |
          mkdir -p examples_out
          PYTHONPATH=src python examples/01_lyapunov_family.py
          test -f examples_out/01_lyapunov_family.png

  docs:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build Sphinx docs
        run: |
          cd docs/sphinx
          sphinx-build -b html -W --keep-going . _build/html
      - uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/sphinx/_build/html
