# Read the Docs configuration for Ariadne.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/sphinx/conf.py
  fail_on_warning: false

formats:
  - htmlzip
